<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gra Autka</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: Arial, sans-serif;
    touch-action: none;
    overflow: hidden;
  }

  #game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Skalowanie całości do ekranu */
    transform-origin: top center;
  }

  #road {
    width: 400px;
    height: 620px;
    background: #222;
    position: relative;
    overflow: hidden;
    border-left: 6px solid #444;
    border-right: 6px solid #444;
    flex-shrink: 0;
  }

  #score {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 24px;
    z-index: 10;
    pointer-events: none;
  }

  #lives {
    position: absolute;
    top: 10px;
    left: 10px;
    color: red;
    font-size: 24px;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 4px;
  }

  #player {
    position: absolute;
    width: 81px;
    height: 115px;
    bottom: 24px;
    z-index: 5;
  }

  #player img, #enemy img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  #enemy {
    position: absolute;
    width: 81px;
    height: 115px;
    z-index: 4;
  }

  #start-screen, #gameover {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    color: #fff;
    font-size: 36px;
    display: flex;
  }

  #gameover, #pause-screen { display: none; }

  #start-screen p, #gameover p {
    font-size: 16px;
    color: #aaa;
    margin-top: 10px;
  }

  button {
    margin-top: 20px;
    padding: 12px 36px;
    font-size: 22px;
    cursor: pointer;
    background: #e74c3c;
    color: #fff;
    border: none;
    border-radius: 6px;
  }
  button:hover { background: #c0392b; }
  button.green { background: #27ae60; }
  button.green:hover { background: #1e8449; }

  #pause-screen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    color: #fff;
    font-size: 42px;
  }

  /* Przyciski dotykowe */
  #touch-controls {
    display: flex;
    width: 400px;
    margin-top: 10px;
    gap: 10px;
  }

  .touch-btn {
    flex: 1;
    height: 80px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #555;
    border-radius: 10px;
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .touch-btn:active { background: rgba(255,255,255,0.28); }

  #pause-btn {
    width: 400px;
    height: 44px;
    margin-top: 8px;
    background: rgba(255,255,255,0.07);
    border: 2px solid #444;
    border-radius: 8px;
    color: #aaa;
    font-size: 16px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #pause-btn:active { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<div id="game-area">
  <div id="road">
    <div id="lives">❤️❤️❤️</div>
    <div id="score">0</div>
    <div id="player"><img src="auto_nowe_L.png" alt="gracz"></div>
    <div id="enemy"><img id="enemy-img" src="" alt="wróg"></div>

    <div id="start-screen">
      <div>GRAJ!</div>
      <p>[ A ] lewo &nbsp; [ D ] prawo</p>
      <button onclick="startGame()">START</button>
    </div>

    <div id="pause-screen">
      <div>PAUZA</div>
      <button class="green" onclick="resumeGame()">▶ Wznów</button>
      <button onclick="endFromPause()">✕ Zakończ</button>
    </div>

    <div id="gameover">
      <div>KONIEC!</div>
      <div id="final-score" style="font-size:24px;margin-top:10px;"></div>
      <button onclick="startGame()">Jeszcze raz</button>
    </div>
  </div>

  <div id="touch-controls">
    <div class="touch-btn" id="btn-left">◀</div>
    <div class="touch-btn" id="btn-right">▶</div>
  </div>
  <div id="pause-btn" onclick="togglePause()">⏸ PAUZA</div>
</div>

<script>
const ROAD_W = 400;
const ROAD_H = 620;
const CAR_W = 81;
const CAR_H = 115;
const LANES = 4;
const LANE_W = ROAD_W / LANES;

const enemyImages = [
  'auto_nowe_aqua.png', 'auto_nowe_blue.png', 'auto_nowe_green.png',
  'auto_nowe_orange.png', 'auto_nowe_purple.png', 'auto_nowe_red.png', 'auto_nowe_yellow.png'
];

const playerEl   = document.getElementById('player');
const enemyEl    = document.getElementById('enemy');
const enemyImg   = document.getElementById('enemy-img');
const scoreEl    = document.getElementById('score');
const livesEl    = document.getElementById('lives');
const gameoverEl = document.getElementById('gameover');
const startScreenEl = document.getElementById('start-screen');
const finalScoreEl  = document.getElementById('final-score');
const pauseScreenEl = document.getElementById('pause-screen');
const gameArea   = document.getElementById('game-area');

// --- Skalowanie do ekranu ---
function scaleGame() {
  const totalH = gameArea.offsetHeight; // road + buttons
  const scaleX = window.innerWidth  / 400;
  const scaleY = window.innerHeight / totalH;
  const scale  = Math.min(scaleX, scaleY, 1); // nie powiększaj powyżej 1 na desktopie
  gameArea.style.transform = `scale(${scale})`;
  // Wyśrodkuj pionowo gdy jest miejsce
  const scaledH = totalH * scale;
  gameArea.style.marginTop = Math.max(0, (window.innerHeight - scaledH) / 2) + 'px';
}
window.addEventListener('resize', scaleGame);
// Odpal po załadowaniu (game-area ma stałą wysokość po wyrenderowaniu)
window.addEventListener('load', scaleGame);
setTimeout(scaleGame, 50); // fallback

// --- Sterowanie klawiaturą ---
const keys = { a: false, d: false };
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { togglePause(); return; }
  if (e.key === 'a' || e.key === 'A') keys.a = true;
  if (e.key === 'd' || e.key === 'D') keys.d = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'a' || e.key === 'A') keys.a = false;
  if (e.key === 'd' || e.key === 'D') keys.d = false;
});

// --- Przyciski dotykowe ---
const btnLeft  = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');

btnLeft.addEventListener('touchstart',  e => { e.preventDefault(); keys.a = true;  }, { passive: false });
btnLeft.addEventListener('touchend',    e => { e.preventDefault(); keys.a = false; }, { passive: false });
btnLeft.addEventListener('touchcancel', () => { keys.a = false; });
btnRight.addEventListener('touchstart',  e => { e.preventDefault(); keys.d = true;  }, { passive: false });
btnRight.addEventListener('touchend',    e => { e.preventDefault(); keys.d = false; }, { passive: false });
btnRight.addEventListener('touchcancel', () => { keys.d = false; });

btnLeft.addEventListener('mousedown',  () => keys.a = true);
btnLeft.addEventListener('mouseup',    () => keys.a = false);
btnRight.addEventListener('mousedown', () => keys.d = true);
btnRight.addEventListener('mouseup',   () => keys.d = false);

// --- Logika gry ---
let playerLane, playerX, enemyY, enemyX;
let speed, score, scoreTimer, lives;
let invincible = false;
let paused = false;
let gameRunning = false;
let animFrame;
let moveCooldown = 0;

function laneX(lane) {
  return lane * LANE_W + (LANE_W - CAR_W) / 2;
}

function spawnEnemy() {
  const lane = Math.floor(Math.random() * LANES);
  enemyX = laneX(lane);
  enemyY = -CAR_H;
  enemyImg.src = enemyImages[Math.floor(Math.random() * enemyImages.length)];
  enemyEl.style.left = enemyX + 'px';
  enemyEl.style.top  = enemyY + 'px';
}

function updateLives() {
  livesEl.textContent = '❤️'.repeat(lives);
}

function togglePause() {
  if (!gameRunning && !paused) return;
  paused ? resumeGame() : (() => {
    paused = true;
    gameRunning = false;
    pauseScreenEl.style.display = 'flex';
  })();
}

function resumeGame() {
  pauseScreenEl.style.display = 'none';
  paused = false;
  gameRunning = true;
  loop();
}

function endFromPause() {
  pauseScreenEl.style.display = 'none';
  paused = false;
  gameRunning = false;
  finalScoreEl.textContent = 'Wynik: ' + score;
  gameoverEl.style.display = 'flex';
}

function startGame() {
  startScreenEl.style.display = 'none';
  gameoverEl.style.display    = 'none';
  pauseScreenEl.style.display = 'none';
  paused = false;
  playerLane = Math.floor(LANES / 2);
  playerX = laneX(playerLane);
  playerEl.style.left    = playerX + 'px';
  playerEl.style.opacity = '1';
  speed = 4; score = 0; scoreTimer = 0; lives = 3;
  invincible = false;
  scoreEl.textContent = '0';
  updateLives();
  spawnEnemy();
  gameRunning = true;
  cancelAnimationFrame(animFrame);
  loop();
}

function loop() {
  if (!gameRunning) return;

  moveCooldown--;
  if (moveCooldown <= 0) {
    if      (keys.a && playerLane > 0)          { playerLane--; moveCooldown = 10; }
    else if (keys.d && playerLane < LANES - 1)  { playerLane++; moveCooldown = 10; }
  }
  playerX += (laneX(playerLane) - playerX) * 0.25;
  playerEl.style.left = playerX + 'px';

  enemyY += speed;
  enemyEl.style.top = enemyY + 'px';
  if (enemyY > ROAD_H) spawnEnemy();

  if (!invincible) {
    const pTop = ROAD_H - 24 - CAR_H;
    const overlap =
      playerX < enemyX + CAR_W - 8 && playerX + CAR_W > enemyX + 8 &&
      pTop < enemyY + CAR_H - 10   && pTop + CAR_H > enemyY + 10;

    if (overlap) {
      lives--;
      updateLives();
      spawnEnemy();
      if (lives <= 0) {
        gameRunning = false;
        finalScoreEl.textContent = 'Wynik: ' + score;
        gameoverEl.style.display = 'flex';
        return;
      }
      invincible = true;
      let blink = 0;
      const iv = setInterval(() => {
        blink++;
        playerEl.style.opacity = blink % 2 === 0 ? '1' : '0.2';
        if (blink >= 10) { clearInterval(iv); playerEl.style.opacity = '1'; invincible = false; }
      }, 120);
    }
  }

  scoreTimer++;
  if (scoreTimer >= 10) {
    score++;
    scoreTimer = 0;
    scoreEl.textContent = score;
    speed = Math.min(12, 4 + score * 0.02);
  }

  animFrame = requestAnimationFrame(loop);
}
</script>
</body>
</html>
